name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: umea_events
          POSTGRES_USER: umea
          POSTGRES_PASSWORD: umea
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U umea -d umea_events"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build & test
        working-directory: umea-events
        run: mvn -B clean verify
