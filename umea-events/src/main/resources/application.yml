spring:
  application:
    name: umea-events

  datasource:
    # Värden läses från miljövariabler med lokala defaults (matchar compose.yaml).
    url: ${DB_URL:jdbc:postgresql://localhost:5432/umea_events}
    username: ${DB_USER:umea}
    password: ${DB_PASSWORD:umea}

  jpa:
    hibernate:
      # 'validate' = Hibernate rör ALDRIG schemat, det äger Flyway. Skyddar mot
      # oavsiktliga schemaändringar i produktion (se arkitekturdokumentet).
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        # Exponera medvetet bara health + info publikt. Inga interna endpoints.
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8080

logging:
  level:
    org.flywaydb: info
