spring:
  application:
    name: umea-events

  datasource:
    # Värden läses från miljövariabler med lokala defaults (matchar compose.yaml).
    url: ${DB_URL:jdbc:postgresql://localhost:5432/umea_events}
    username: ${DB_USER:umea}
    password: ${DB_PASSWORD:umea}

  jpa:
    hibernate:
      # 'validate' = Hibernate rör ALDRIG schemat, det äger Flyway. Skyddar mot
      # oavsiktliga schemaändringar i produktion (se arkitekturdokumentet).
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

management:
  endpoints:
    web:
      exposure:
        # Exponera medvetet bara health + info publikt. Inga interna endpoints.
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8080

logging:
  level:
    org.flywaydb: info

app:
  jwt:
    secret: ${JWT_SECRET:umea-events-secret-key-must-be-at-least-32-chars-long}
    access-token-expiration-ms: 900000    # 15 minuter
    refresh-token-expiration-days: 7

  # Skapar ett första ADMIN-konto vid uppstart OM båda är satta och kontot inte redan finns.
  # Sätts via miljövariabler i produktion (en färsk DB har annars ingen admin att logga in med).
  bootstrap-admin:
    email: ${BOOTSTRAP_ADMIN_EMAIL:}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}

  cors:
    # Komma-separerad lista av tillåtna webb-origins (mönster tillåtna).
    # Prod: sätt CORS_ALLOWED_ORIGINS=https://admin.uven.se
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*}

  # Supabase Storage för bilduppladdning. Sätts via Fly-secrets i produktion.
  # Tomma värden = uppladdning avstängd (endpointen svarar med fel).
  storage:
    supabase-url: ${SUPABASE_URL:}
    service-key: ${SUPABASE_SERVICE_KEY:}
    bucket: ${SUPABASE_BUCKET:event-images}
