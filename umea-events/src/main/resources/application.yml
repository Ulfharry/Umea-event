spring:
  application:
    name: umea-events

  datasource:
    # Värden läses från miljövariabler med lokala defaults (matchar compose.yaml).
    url: ${DB_URL:jdbc:postgresql://localhost:5432/umea_events}
    username: ${DB_USER:umea}
    password: ${DB_PASSWORD:umea}

  jpa:
    hibernate:
      # 'validate' = Hibernate rör ALDRIG schemat, det äger Flyway. Skyddar mot
      # oavsiktliga schemaändringar i produktion (se arkitekturdokumentet).
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        # Exponera medvetet bara health + info publikt. Inga interna endpoints.
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8080

logging:
  level:
    org.flywaydb: info

app:
  jwt:
    secret: ${JWT_SECRET:umea-events-secret-key-must-be-at-least-32-chars-long}
    access-token-expiration-ms: 900000    # 15 minuter
    refresh-token-expiration-days: 7

  # Skapar ett första ADMIN-konto vid uppstart OM båda är satta och kontot inte redan finns.
  # Sätts via miljövariabler i produktion (en färsk DB har annars ingen admin att logga in med).
  bootstrap-admin:
    email: ${BOOTSTRAP_ADMIN_EMAIL:}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}
